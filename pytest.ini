[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add src/ to the Python path so tests can `import core`, `import autodiff`, etc.
pythonpath = src

# Display short tracebacks; -v for verbose output
addopts =
    --tb=short
    -v
    --strict-markers

# Treat these warnings as errors
filterwarnings =
    error::DeprecationWarning
    ignore::UserWarning

# Register custom marks
markers =
    slow: mark test as slow (deselect with -m "not slow")
    gpu: mark test as requiring a GPU
    multi_device: mark test as requiring multiple devices
